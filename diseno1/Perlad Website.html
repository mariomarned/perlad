<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perlad — Innovación Sostenible</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: #FAFAF5; color: #1A1A1A; overflow-x: hidden; }
  ::selection { background: #94C11F; color: #fff; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #1A1A1A; }
  ::-webkit-scrollbar-thumb { background: #94C11F; border-radius: 4px; }

  /* Honeycomb background pattern */
  .honeycomb-bg {
    background-image: url("data:image/svg+xml,%3Csvg width='56' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M28 66L0 50V16L28 0l28 16v34L28 66zm0 34L0 84V50l28-16 28 16v34L28 100z' fill='none' stroke='%2394C11F' stroke-width='0.5' opacity='0.12'/%3E%3C/svg%3E");
    background-size: 56px 100px;
  }

  .honeycomb-bg-dark {
    background-image: url("data:image/svg+xml,%3Csvg width='56' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M28 66L0 50V16L28 0l28 16v34L28 66zm0 34L0 84V50l28-16 28 16v34L28 100z' fill='none' stroke='%2394C11F' stroke-width='0.5' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 56px 100px;
  }

  /* Responsive nav */
  @media (max-width: 900px) {
    .nav-links-desktop { display: none !important; }
    .nav-hamburger { display: block !important; }
  }

  /* Hover helpers */
  .nav-dropdown-item:hover { background: rgba(148,193,31,0.1); }
  .nav-dropdown-sub:hover { color: #94C11F !important; }
  .nav-cta:hover { transform: scale(1.05) !important; }

  /* Parallax float animation */
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(60px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#94C11F",
  "headingFont": "'DM Sans', sans-serif",
  "heroStyle": "minimal",
  "cardStyle": "cut",
  "bgTone": "warm"
}/*EDITMODE-END*/;

const bgTones = {
  warm: { bg: '#FAFAF5', surface: '#F5F0E8', text: '#1A1A1A' },
  cool: { bg: '#F5F7FA', surface: '#EDF1F5', text: '#1A1A1A' },
  dark: { bg: '#1A1A1A', surface: '#252525', text: '#F5F0E8' }
};

/* ═══════════════ HERO SECTION ═══════════════ */
const HeroSection = ({ tweaks, scrollTo }) => {
  const tone = bgTones[tweaks.bgTone] || bgTones.warm;
  return (
    <section id="hero" style={{
      minHeight: '100vh', position: 'relative', overflow: 'hidden',
      background: '#1A1A1A', display: 'flex', flexDirection: 'column', justifyContent: 'center'
    }}>
      {/* Honeycomb overlay */}
      <div className="honeycomb-bg-dark" style={{ position: 'absolute', inset: 0, zIndex: 1 }}></div>

      {/* Animated floating diamonds */}
      {[...Array(6)].map((_, i) => (
        <div key={i} style={{
          position: 'absolute', zIndex: 1,
          left: `${10 + i * 15}%`, top: `${20 + (i % 3) * 25}%`,
          animation: `float ${3 + i * 0.5}s ease-in-out infinite`,
          animationDelay: `${i * 0.4}s`
        }}>
          <Diamond size={20 + i * 8} bg={tweaks.accentColor} style={{ opacity: 0.1 + i * 0.03 }} />
        </div>
      ))}

      {/* Large honeycomb texture bg image */}
      <div style={{
        position: 'absolute', right: -100, top: '50%', transform: 'translateY(-50%)',
        width: '55vw', height: '110vh', zIndex: 1,
        background: 'url(assets/honeycomb-texture.png) center/cover',
        maskImage: 'linear-gradient(to left, rgba(0,0,0,0.4) 0%, transparent 80%)',
        WebkitMaskImage: 'linear-gradient(to left, rgba(0,0,0,0.4) 0%, transparent 80%)',
        opacity: 0.5
      }}></div>

      <div style={{
        maxWidth: 1280, margin: '0 auto', padding: '140px 40px 0',
        position: 'relative', zIndex: 2, width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 60, flexWrap: 'wrap'
      }}>
        <div style={{ maxWidth: 700, flex: '1 1 500px' }}>

          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 10,
            background: 'rgba(148,193,31,0.12)', border: `1px solid ${tweaks.accentColor}33`,
            padding: '8px 20px', marginBottom: 32,
            clipPath: 'polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%)',
            animation: 'fadeIn 0.8s ease-out 0.1s both'
          }}>
            <Diamond size={10} bg={tweaks.accentColor} />
            <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: tweaks.accentColor, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase' }}>
              Empaques 100% Reciclables
            </span>
          </div>

          <h1 style={{
            fontFamily: tweaks.headingFont,
            fontSize: 'clamp(40px, 6vw, 76px)', fontWeight: 800,
            color: '#fff', lineHeight: 1.05, marginBottom: 24,
            animation: 'slideUp 0.8s ease-out 0.2s both'
          }}>
            Innovación{' '}
            <span style={{ color: tweaks.accentColor, position: 'relative' }}>
              Sostenible
              <svg style={{ position: 'absolute', bottom: -8, left: 0, width: '100%', height: 12 }} viewBox="0 0 200 12">
                <path d="M0 8 Q50 0 100 8 Q150 16 200 8" fill="none" stroke={tweaks.accentColor} strokeWidth="2" opacity="0.5" />
              </svg>
            </span>
          </h1>

          <p style={{
            fontFamily: "'DM Sans', sans-serif", fontSize: 'clamp(16px, 2vw, 20px)',
            color: 'rgba(255,255,255,0.65)', lineHeight: 1.7, marginBottom: 40,
            maxWidth: 520,
            animation: 'slideUp 0.8s ease-out 0.4s both'
          }}>
            Estructuras de cartón panal fabricadas con papel 100% reciclable. Soluciones de empaque que protegen tu producto y el planeta.
          </p>

          <div style={{
            display: 'flex', gap: 16, flexWrap: 'wrap',
            animation: 'slideUp 0.8s ease-out 0.6s both'
          }}>
            <button onClick={() => scrollTo('productos')} style={{
              background: tweaks.accentColor, color: '#1A1A1A',
              padding: '16px 36px', border: 'none',
              fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 700,
              textTransform: 'uppercase', letterSpacing: '0.06em', cursor: 'pointer',
              clipPath: 'polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%)',
              transition: 'all 0.3s'
            }} className="nav-cta">
              Ver Catálogo
            </button>
            <button onClick={() => scrollTo('contacto')} style={{
              background: 'transparent', color: '#fff',
              padding: '16px 36px', border: `1px solid rgba(255,255,255,0.3)`,
              fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 500,
              cursor: 'pointer',
              clipPath: 'polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%)',
              transition: 'all 0.3s'
            }}>
              Contáctanos
            </button>
          </div>
        </div>

        {/* Logo on the right */}
        <div style={{
          flex: '0 0 auto',
          animation: 'scaleIn 1s ease-out 0.5s both',
          display: 'flex', alignItems: 'center', justifyContent: 'center'
        }}>
          <div style={{
            width: 'clamp(180px, 20vw, 300px)', height: 'clamp(207px, 23vw, 345px)',
            clipPath: 'polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%)',
            background: `linear-gradient(135deg, rgba(148,193,31,0.15), rgba(148,193,31,0.05))`,
            border: 'none',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            position: 'relative'
          }}>
            <div style={{
              position: 'absolute', inset: 0,
              clipPath: 'polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%)',
              background: `url(assets/honeycomb-texture.png) center/cover`,
              opacity: 0.3
            }}></div>
            <img src="assets/logo-perlad.png" alt="Perlad" style={{
              width: '65%', filter: 'brightness(0) invert(1)',
              position: 'relative', zIndex: 1,
              drop: '0 4px 20px rgba(0,0,0,0.3)'
            }} />
          </div>
        </div>
      </div>

      {/* Stats bar - separate row below hero */}
      <div style={{
        maxWidth: 1280, margin: '0 auto', padding: '60px 40px 80px',
        position: 'relative', zIndex: 2
      }}>
        <div style={{
          display: 'flex', gap: 48, flexWrap: 'wrap'
        }}>
          {[
            { n: 15, s: '+', label: 'Años de experiencia' },
            { n: 100, s: '%', label: 'Materiales reciclables' },
            { n: 500, s: '+', label: 'Clientes satisfechos' }
          ].map((d, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
              <Diamond size={40} bg={`${tweaks.accentColor}22`} style={{ flexShrink: 0 }}>
                <Diamond size={16} bg={tweaks.accentColor} />
              </Diamond>
              <div>
                <div style={{ fontFamily: tweaks.headingFont, fontSize: 32, fontWeight: 700, color: '#fff' }}>
                  <AnimCounter end={d.n} />{d.s}
                </div>
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: 'rgba(255,255,255,0.5)' }}>{d.label}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

/* ═══════════════ PRODUCTS SECTION ═══════════════ */
const ProductsSection = ({ tweaks }) => {
  const tone = bgTones[tweaks.bgTone] || bgTones.warm;
  const products = [
    { name: 'Empaques Personalizados', desc: 'Soluciones a medida en cartón panal para proteger cualquier tipo de producto con máxima eficiencia.' },
    { name: 'Estibas de Cartón', desc: 'Alternativa liviana y resistente a las estibas de madera. 100% reciclables y libres de fumigación.' },
    { name: 'Esquinas y Punteras', desc: 'Protección perimetral para tus productos durante el transporte y almacenamiento.' },
    { name: 'Relleno Cartón Panal', desc: 'Material de relleno expandible que se adapta a la forma del producto, reemplazando el plástico.' },
    { name: 'Rollo de Papel Panal', desc: 'Papel panal en rollo para envolver y proteger. Biodegradable y con excelente amortiguación.' },
    { name: 'Bolsa Bio', desc: 'Bolsas biodegradables y compostables para un empaque responsable con el medio ambiente.' }
  ];

  return (
    <section id="productos" style={{
      padding: '120px 40px', background: tone.bg,
      position: 'relative'
    }}>
      <div className="honeycomb-bg" style={{ position: 'absolute', inset: 0, opacity: 0.5 }}></div>
      <div style={{ maxWidth: 1280, margin: '0 auto', position: 'relative', zIndex: 1 }}>
        <SectionTitle sub="Soluciones de empaque sustentables para cada necesidad" tweaks={tweaks}>
          Nuestros Productos
        </SectionTitle>
        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fill, minmax(340px, 1fr))',
          gap: 28
        }}>
          {products.map((p, i) => (
            <ProductCard key={i} name={p.name} desc={p.desc} tweaks={tweaks} delay={i * 100} />
          ))}
        </div>
      </div>
    </section>
  );
};

/* ═══════════════ ABOUT SECTION ═══════════════ */
const AboutSection = ({ tweaks }) => {
  const [ref, vis] = useReveal();
  return (
    <section id="nosotros" ref={ref} style={{
      padding: '120px 40px',
      background: '#1A1A1A', color: '#fff', position: 'relative', overflow: 'hidden'
    }}>
      <div className="honeycomb-bg-dark" style={{ position: 'absolute', inset: 0 }}></div>
      <div style={{
        maxWidth: 1280, margin: '0 auto', position: 'relative', zIndex: 1,
        display: 'grid', gridTemplateColumns: 'minmax(0, 1fr) minmax(0, 1fr)', gap: 80, alignItems: 'center'
      }}>
        {/* Hexagon grid */}
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8,
          opacity: vis ? 1 : 0, transform: vis ? 'none' : 'translateX(-40px)',
          transition: 'all 0.8s ease-out'
        }}>
          {[...Array(6)].map((_, i) => (
            <div key={i} style={{
              aspectRatio: '1/1.15',
              clipPath: 'polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%)',
              background: i === 2 ? tweaks.accentColor :
                i === 4 ? `linear-gradient(135deg, #C4A265, #8B6914)` :
                `linear-gradient(135deg, #333, #222)`,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              transition: `all 0.5s ${i * 0.1}s`
            }}>
              {i === 2 && <img src="assets/logo-perlad.png" style={{ width: '60%', filter: 'brightness(0)' }} alt="" />}
              {i === 4 && <span style={{ fontFamily: 'monospace', color: 'rgba(255,255,255,0.5)', fontSize: 11 }}>factory photo</span>}
              {![2,4].includes(i) && <span style={{ fontFamily: 'monospace', color: 'rgba(255,255,255,0.3)', fontSize: 11 }}>team photo</span>}
            </div>
          ))}
        </div>

        <div style={{
          opacity: vis ? 1 : 0, transform: vis ? 'none' : 'translateX(40px)',
          transition: 'all 0.8s ease-out 0.3s'
        }}>
          <SectionTitle light tweaks={tweaks}>Quiénes Somos</SectionTitle>
          <p style={{
            fontFamily: "'DM Sans', sans-serif", fontSize: 17, lineHeight: 1.8,
            color: 'rgba(255,255,255,0.7)', marginBottom: 24
          }}>
            En Perlad somos pioneros en el desarrollo de estructuras de cartón panal, fabricadas con papel 100% reciclable. Nuestra misión es ofrecer soluciones de empaque innovadoras que protejan tanto tu producto como el medio ambiente.
          </p>
          <p style={{
            fontFamily: "'DM Sans', sans-serif", fontSize: 17, lineHeight: 1.8,
            color: 'rgba(255,255,255,0.7)', marginBottom: 32
          }}>
            Con más de 15 años de experiencia, hemos desarrollado tecnología propia para crear materiales que reemplazan al plástico y la madera en la industria del embalaje.
          </p>
          <div style={{ display: 'flex', gap: 32, flexWrap: 'wrap' }}>
            {['Reciclable', 'Biodegradable', 'Liviano', 'Resistente'].map((v, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <Diamond size={24} bg={tweaks.accentColor}>
                  <span style={{ fontSize: 10, color: '#1A1A1A', fontWeight: 700 }}>✓</span>
                </Diamond>
                <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600, color: '#fff' }}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
};

/* ═══════════════ SUSTAINABILITY SECTION ═══════════════ */
const SustainabilitySection = ({ tweaks }) => {
  const [ref, vis] = useReveal();
  const tone = bgTones[tweaks.bgTone] || bgTones.warm;
  const pillars = [
    { icon: '♻', title: 'Materiales Reciclables', desc: 'Todos nuestros productos están fabricados con papel 100% reciclable y reciclado.' },
    { icon: '🌱', title: 'Huella de Carbono', desc: 'Procesos optimizados para minimizar emisiones y consumo energético.' },
    { icon: '📦', title: 'Cero Desperdicio', desc: 'Diseño eficiente que aprovecha al máximo cada hoja de material.' },
    { icon: '🔄', title: 'Economía Circular', desc: 'Nuestros empaques se reintegran al ciclo productivo después de su uso.' }
  ];

  return (
    <section id="sostenibilidad" ref={ref} style={{
      padding: '120px 40px',
      background: `linear-gradient(180deg, ${tone.surface} 0%, ${tone.bg} 100%)`,
      position: 'relative'
    }}>
      <div style={{ maxWidth: 1280, margin: '0 auto', position: 'relative', zIndex: 1 }}>
        <SectionTitle sub="Nuestro compromiso con el planeta" tweaks={tweaks}>
          Sostenibilidad
        </SectionTitle>

        <div style={{
          display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: '8px 12px',
          maxWidth: 1000, margin: '0 auto'
        }}>
          {pillars.map((p, i) => {
            const [cRef, cVis] = useReveal();
            const [hov, setHov] = React.useState(false);
            return (
              <div key={i} ref={cRef}
                onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
                style={{
                  width: 230, height: 265,
                  position: 'relative', overflow: 'hidden',
                  marginTop: i % 2 !== 0 ? 60 : 0,
                  opacity: cVis ? 1 : 0,
                  transform: cVis ? (hov ? 'scale(1.05)' : 'scale(1)') : 'translateY(30px)',
                  transition: `all 0.6s ease-out ${i * 0.15}s`,
                }}>
                {/* Hex background shape */}
                <div style={{
                  position: 'absolute', inset: 0,
                  clipPath: 'polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%)',
                  background: hov ? (tweaks.bgTone === 'dark' ? '#333' : '#f0ebe2') : (tweaks.bgTone === 'dark' ? '#252525' : '#fff'),
                  border: 'none',
                  transition: 'background 0.4s'
                }}></div>
                {/* Hex border via SVG */}
                <svg viewBox="0 0 100 115" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
                  <polygon points="50,0 100,25 100,75 50,100 0,75 0,25"
                    fill="none" stroke={hov ? tweaks.accentColor : (tweaks.bgTone === 'dark' ? '#444' : '#d8d0c4')}
                    strokeWidth="0.8" style={{ transition: 'stroke 0.4s' }} />
                </svg>
                {/* Content */}
                <div style={{
                  position: 'relative', zIndex: 1,
                  display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                  height: '100%', padding: '48px 24px', textAlign: 'center'
                }}>
                  <div style={{
                    width: 56, height: 56, marginBottom: 14,
                    clipPath: 'polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%)',
                    background: hov ? tweaks.accentColor : `${tweaks.accentColor}20`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 24, transition: 'background 0.4s'
                  }}>
                    <span style={{ filter: hov ? 'grayscale(1) brightness(0.2)' : 'none', transition: 'filter 0.4s' }}>{p.icon}</span>
                  </div>
                  <h3 style={{
                    fontFamily: tweaks.headingFont, fontSize: 15, fontWeight: 700,
                    color: tweaks.bgTone === 'dark' ? '#fff' : '#1A1A1A',
                    marginBottom: 6, lineHeight: 1.3
                  }}>{p.title}</h3>
                  <p style={{
                    fontFamily: "'DM Sans', sans-serif", fontSize: 12, lineHeight: 1.6,
                    color: tweaks.bgTone === 'dark' ? 'rgba(255,255,255,0.6)' : '#6B6B6B',
                    margin: 0
                  }}>{p.desc}</p>
                </div>
              </div>
            );
          })}
        </div>

        {/* Impact banner */}
        <div style={{
          marginTop: 64, background: '#1A1A1A', padding: '48px 56px',
          display: 'flex', justifyContent: 'space-around', flexWrap: 'wrap', gap: 32,
          clipPath: 'polygon(16px 0%, calc(100% - 16px) 0%, 100% 16px, 100% calc(100% - 16px), calc(100% - 16px) 100%, 16px 100%, 0% calc(100% - 16px), 0% 16px)',
          position: 'relative', overflow: 'hidden'
        }}>
          <div className="honeycomb-bg-dark" style={{ position: 'absolute', inset: 0 }}></div>
          {[
            { n: 2000, s: '+', label: 'Toneladas de plástico evitadas' },
            { n: 95, s: '%', label: 'Material reciclado utilizado' },
            { n: 30, s: '%', label: 'Reducción huella de carbono' }
          ].map((d, i) => (
            <div key={i} style={{ textAlign: 'center', position: 'relative', zIndex: 1 }}>
              <div style={{ fontFamily: tweaks.headingFont, fontSize: 40, fontWeight: 700, color: tweaks.accentColor }}>
                <AnimCounter end={d.n} />{d.s}
              </div>
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: 'rgba(255,255,255,0.6)', marginTop: 4 }}>{d.label}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

/* ═══════════════ TESTIMONIALS ═══════════════ */
const TestimonialsSection = ({ tweaks }) => {
  const [active, setActive] = React.useState(0);
  const testimonials = [
    { text: 'Perlad transformó nuestra cadena de embalaje. Redujimos costos y nuestro impacto ambiental simultáneamente.', author: 'Carlos Méndez', role: 'Director de Logística, Alimentos del Valle' },
    { text: 'La calidad del cartón panal superó nuestras expectativas. Nuestros productos llegan intactos y sin plástico.', author: 'María Fernández', role: 'Gerente de Compras, TechPack' },
    { text: 'Excelente servicio y compromiso con la sostenibilidad. Son nuestro aliado estratégico en empaques.', author: 'Roberto Silva', role: 'CEO, EcoExport' }
  ];

  React.useEffect(() => {
    const t = setInterval(() => setActive(a => (a + 1) % testimonials.length), 5000);
    return () => clearInterval(t);
  }, []);

  return (
    <section style={{
      padding: '100px 40px', background: '#1A1A1A', position: 'relative', overflow: 'hidden'
    }}>

/* ═══════════════ MAIN APP ═══════════════ */
const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [activeSection, setActiveSection] = React.useState('hero');

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollTo ? window.scrollTo({ top: el.offsetTop - 70, behavior: 'smooth' }) : null;
    if (el) window.scrollTo({ top: el.offsetTop - 70, behavior: 'smooth' });
  };

  // Track active section on scroll
  React.useEffect(() => {
    const sections = ['hero', 'productos', 'nosotros', 'sostenibilidad', 'blog', 'contacto'];
    const handler = () => {
      const y = window.scrollY + 200;
      for (let i = sections.length - 1; i >= 0; i--) {
        const el = document.getElementById(sections[i]);
        if (el && el.offsetTop <= y) { setActiveSection(sections[i]); break; }
      }
    };
    window.addEventListener('scroll', handler, { passive: true });
    return () => window.removeEventListener('scroll', handler);
  }, []);

  return (
    <>
      <NavBar tweaks={tweaks} activeSection={activeSection} scrollTo={scrollTo} />
      <HeroSection tweaks={tweaks} scrollTo={scrollTo} />
      <ProductsSection tweaks={tweaks} />
      <AboutSection tweaks={tweaks} />
      <SustainabilitySection tweaks={tweaks} />
      <TestimonialsSection tweaks={tweaks} />
      <BlogSection tweaks={tweaks} />
      <ContactSection tweaks={tweaks} />
      <Footer tweaks={tweaks} />

      <TweaksPanel>
        <TweakSection title="Colores">
          <TweakColor label="Color acento" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
          <TweakRadio label="Tono fondo" options={['warm', 'cool', 'dark']} value={tweaks.bgTone} onChange={v => setTweak('bgTone', v)} />
        </TweakSection>
        <TweakSection title="Tipografía">
          <TweakSelect label="Heading font" options={["'Playfair Display', serif", "'DM Sans', sans-serif", "'Georgia', serif"]} value={tweaks.headingFont} onChange={v => setTweak('headingFont', v)} />
        </TweakSection>
        <TweakSection title="Hero">
          <TweakRadio label="Estilo" options={['bold', 'minimal', 'centered']} value={tweaks.heroStyle} onChange={v => setTweak('heroStyle', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

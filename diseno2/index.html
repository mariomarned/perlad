<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#94C11F",
  "heroLayout": "centered",
  "cardCorner": "hex",
  "bgTone": "cream"
}/*EDITMODE-END*/;

const COLORS = {
  green: '#94C11F',
  darkGreen: '#6B8F0E',
  black: '#1A1A1A',
  cardboard: '#C4A265',
  cardboardDark: '#8B6914',
  cream: '#F5F0E8',
  warmWhite: '#FDFBF7'
};

const bgTones = {
  cream: { bg: '#F5F0E8', surface: '#FDFBF7', dark: '#1A1A1A' },
  white: { bg: '#FDFBF7', surface: '#F5F0E8', dark: '#1A1A1A' },
  dark: { bg: '#1A1A1A', surface: '#252525', dark: '#111' }
};

/* ── Hooks ── */
const useReveal = (threshold = 0.15) => {
  const ref = React.useRef(null);
  const [v, setV] = React.useState(false);
  React.useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setV(true); obs.disconnect(); } }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, v];
};

const AnimCounter = ({ end, suffix = '' }) => {
  const [c, setC] = React.useState(0);
  const ref = React.useRef(null);
  const started = React.useRef(false);
  React.useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        const s = performance.now();
        const run = (now) => { const p = Math.min((now - s) / 2000, 1); setC(Math.floor(p * end)); if (p < 1) requestAnimationFrame(run); };
        requestAnimationFrame(run);
      }
    }, { threshold: 0.5 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [end]);
  return <span ref={ref}>{c}{suffix}</span>;
};

/* ── Hex SVG helper ── */
const HexSVG = ({ size = 100, stroke = '#94C11F', fill = 'none', strokeWidth = 1, opacity = 1, style = {} }) => (
  <svg width={size} height={size * 1.15} viewBox="0 0 100 115" style={style}>
    <polygon points="50,2 98,27 98,87 50,112 2,87 2,27" fill={fill} stroke={stroke} strokeWidth={strokeWidth} opacity={opacity} />
  </svg>
);

/* ── Large hex decorative grid ── */
const HexGrid = ({ count = 12, color = '#94C11F', style = {} }) => (
  <div style={{ position: 'absolute', pointerEvents: 'none', ...style }}>
    <svg width="400" height="500" viewBox="0 0 400 500" style={{ opacity: 0.06 }}>
      {Array.from({ length: count }).map((_, i) => {
        const col = i % 3;
        const row = Math.floor(i / 3);
        const x = col * 120 + (row % 2 ? 60 : 0);
        const y = row * 100;
        return <polygon key={i} points={`${x+60},${y} ${x+120},${y+30} ${x+120},${y+90} ${x+60},${y+120} ${x},${y+90} ${x},${y+30}`}
          fill="none" stroke={color} strokeWidth="1.5" />;
      })}
    </svg>
  </div>
);

/* ═══════ NAVBAR ═══════ */
const Nav = ({ tweaks, scrollTo }) => {
  const [scrolled, setScrolled] = React.useState(false);
  const [menuOpen, setMenuOpen] = React.useState(false);
  React.useEffect(() => {
    const h = () => setScrolled(window.scrollY > 50);
    window.addEventListener('scroll', h, { passive: true });
    return () => window.removeEventListener('scroll', h);
  }, []);

  const isDark = tweaks.bgTone === 'dark';
  const navBg = scrolled ? (isDark ? 'rgba(26,26,26,0.95)' : 'rgba(245,240,232,0.92)') : 'transparent';
  const textColor = scrolled ? (isDark ? '#fff' : '#1A1A1A') : '#1A1A1A';

  const links = [
    { label: 'Productos', id: 'productos' },
    { label: 'Nosotros', id: 'nosotros' },
    { label: 'Sostenibilidad', id: 'sostenibilidad' },
    { label: 'Blog', id: 'blog' },
    { label: 'Contacto', id: 'contacto' }
  ];

  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1000,
      background: navBg, backdropFilter: scrolled ? 'blur(16px)' : 'none',
      transition: 'all 0.4s', borderBottom: scrolled ? `1px solid ${isDark ? 'rgba(148,193,31,0.15)' : 'rgba(0,0,0,0.06)'}` : 'none'
    }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '18px 32px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer' }} onClick={() => scrollTo('hero')}>
          <HexSVG size={28} stroke={tweaks.accentColor} strokeWidth={2.5} />
          <img src="assets/logo-perlad.png" alt="Perlad" style={{
            height: 28, filter: isDark || !scrolled ? 'none' : 'none'
          }} />
        </div>

        <div style={{ display: 'flex', gap: 28, alignItems: 'center' }} className="nav-links-desktop">
          {links.map(l => (
            <a key={l.id} onClick={() => scrollTo(l.id)} style={{
              fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500,
              color: textColor, textDecoration: 'none', cursor: 'pointer',
              letterSpacing: '0.04em', transition: 'color 0.3s', opacity: 0.75
            }}
            onMouseEnter={e => { e.target.style.color = tweaks.accentColor; e.target.style.opacity = '1'; }}
            onMouseLeave={e => { e.target.style.color = textColor; e.target.style.opacity = '0.75'; }}
            >{l.label}</a>
          ))}
          <a onClick={() => scrollTo('contacto')} style={{
            background: tweaks.accentColor, color: '#1A1A1A',
            padding: '10px 28px', fontFamily: "'DM Sans', sans-serif",
            fontSize: 13, fontWeight: 700, cursor: 'pointer', textDecoration: 'none',
            borderRadius: 0, transition: 'transform 0.2s',
            clipPath: 'polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%)'
          }}
          onMouseEnter={e => e.target.style.transform = 'scale(1.05)'}
          onMouseLeave={e => e.target.style.transform = 'scale(1)'}
          >Cotizar</a>
        </div>

        {/* Mobile Hamburger */}
        <div className="nav-hamburger" onClick={() => setMenuOpen(!menuOpen)}
          style={{ display: 'none', cursor: 'pointer', padding: 8 }}>
          <div style={{ width: 24, height: 2, background: textColor, marginBottom: 6, transition: '0.3s', transform: menuOpen ? 'rotate(45deg) translate(5px, 5px)' : 'none' }}></div>
          <div style={{ width: 24, height: 2, background: textColor, marginBottom: 6, opacity: menuOpen ? 0 : 1 }}></div>
          <div style={{ width: 24, height: 2, background: textColor, transition: '0.3s', transform: menuOpen ? 'rotate(-45deg) translate(5px, -5px)' : 'none' }}></div>
        </div>
      </div>

      {/* Mobile Menu Overlay */}
      {menuOpen && (
        <div style={{
          background: isDark ? '#1A1A1A' : '#F5F0E8', padding: '24px 32px',
          borderTop: `1px solid ${tweaks.accentColor}33`, display: 'flex', flexDirection: 'column', gap: 16
        }}>
          {links.map(l => (
            <a key={l.id} onClick={() => { scrollTo(l.id); setMenuOpen(false); }}
              style={{ color: textColor, textDecoration: 'none', fontSize: 18, fontWeight: 500 }}>{l.label}</a>
          ))}
          <a onClick={() => { scrollTo('contacto'); setMenuOpen(false); }}
            style={{ color: tweaks.accentColor, textDecoration: 'none', fontSize: 18, fontWeight: 700 }}>Cotizar</a>
        </div>
      )}
    </nav>
  );
};

/* ═══════ HERO — Split layout with hex mosaic ═══════ */
const Hero = ({ tweaks, scrollTo }) => {

  return (
    <section id="hero" style={{
      minHeight: '100vh', background: tone.bg, position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center'
    }}>
      <HexGrid style={{ right: -80, top: -50 }} />
      <HexGrid color={COLORS.cardboard} style={{ left: -150, bottom: -100 }} count={8} />

      <div style={{
        maxWidth: 1200, margin: '0 auto', padding: '140px 32px 80px', width: '100%',
        display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 60, alignItems: 'center'
      }}>
        {/* Left: Copy */}
        <div>
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 8,
            padding: '6px 16px', border: `1.5px solid ${tweaks.accentColor}`,
            marginBottom: 28, animation: 'fadeIn 0.6s ease-out'
          }}>
            <div style={{ width: 6, height: 6, background: tweaks.accentColor, clipPath: 'polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)' }}></div>
            <span style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: tweaks.accentColor }}>
              Empaques Sostenibles
            </span>
          </div>

          <h1 style={{
            fontFamily: "'Instrument Serif', serif",
            fontSize: 'clamp(44px, 5.5vw, 72px)', fontWeight: 400,
            lineHeight: 1.08, marginBottom: 28, color: tone.dark === '#111' ? '#fff' : '#1A1A1A',
            animation: 'slideUp 0.8s ease-out 0.2s both'
          }}>
            Protegemos tu producto,{' '}

          </h1>

          <p style={{

            marginBottom: 40, animation: 'slideUp 0.8s ease-out 0.4s both'
          }}>

          </p>

          <div style={{ display: 'flex', gap: 16, animation: 'slideUp 0.8s ease-out 0.6s both' }}>

              border: '1.5px solid #1A1A1A', fontSize: 14, fontWeight: 500, cursor: 'pointer',

            }}>Conócenos</button>
          </div>

          {/* Mini stats */}

            {[{ n: 15, s: '+', l: 'Años' }, { n: 100, s: '%', l: 'Reciclable' }, { n: 500, s: '+', l: 'Clientes' }].map((d, i) => (

            ))}

        {/* Right: Hex mosaic with texture */}

          position: 'relative', display: 'flex', justifyContent: 'center', alignItems: 'center',
          animation: 'fadeIn 1s ease-out 0.5s both'
        }}>

          <div style={{

            clipPath: 'polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%)',
            background: 'url(assets/honeycomb-texture.png) center/cover',
            position: 'relative', zIndex: 2
          }}>
            <div style={{
              position: 'absolute', inset: 0,
              background: 'linear-gradient(180deg, transparent 40%, rgba(26,26,26,0.7) 100%)',
              display: 'flex', alignItems: 'flex-end', justifyContent: 'center', padding: 40
            }}>
              <img src="assets/logo-perlad.png" alt="Perlad" style={{ width: '55%', filter: 'brightness(0) invert(1)' }} />
            </div>
          </div>

          {/* Orbiting small hexes */}
          <div style={{
            position: 'absolute', top: -20, right: 20, zIndex: 1,
            animation: 'float 4s ease-in-out infinite'
          }}>
            <div style={{
              width: 100, height: 115,
              clipPath: 'polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%)',
              background: tweaks.accentColor, display: 'flex', alignItems: 'center', justifyContent: 'center'
            }}>

            </div>
          </div>

          <div style={{
            position: 'absolute', bottom: 10, left: 0, zIndex: 1,
            animation: 'float 5s ease-in-out infinite 1s'

            <div style={{

            style={{ position: 'absolute', top: -30, left: -50, zIndex: 0 }} />
        </div>
      </div>

};

/* ═══════ MARQUEE BAND ═══════ */
const MarqueeBand = ({ tweaks }) => {
  const items = ['Cartón Panal', 'Empaques Sustentables', 'Estibas Ecológicas', 'Esquinas y Punteras', '100% Reciclable', 'Innovación Verde', 'Bolsa Bio', 'Papel Panal'];
  return (
    <div style={{
      background: '#1A1A1A', padding: '18px 0', overflow: 'hidden', position: 'relative'
    }}>
      <div style={{
        display: 'flex', gap: 48, animation: 'marquee 25s linear infinite', whiteSpace: 'nowrap',
        width: 'max-content'
      }}>
        {[...items, ...items].map((t, i) => (
          <span key={i} style={{
            fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600,
            color: i % 2 === 0 ? '#fff' : tweaks.accentColor,
            letterSpacing: '0.08em', textTransform: 'uppercase',
            display: 'flex', alignItems: 'center', gap: 12
          }}>
            <span style={{
              width: 8, height: 8, background: tweaks.accentColor,
              clipPath: 'polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)',
              display: 'inline-block'
            }}></span>
            {t}
          </span>
        ))}
      </div>
    </div>
  );
};

/* ═══════ PRODUCTS ═══════ */

    { name: 'Empaques Personalizados', desc: 'Soluciones a medida en cartón panal para proteger cualquier tipo de producto.' },

              fontFamily: "'Instrument Serif', serif", fontSize: 'clamp(32px, 4vw, 52px)',

          </div>
          <p style={{ fontSize: 15, color: '#888', maxWidth: 380, lineHeight: 1.7 }}>
            Cada solución diseñada para maximizar protección y minimizar impacto ambiental.
          </p>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20 }}>

            const [ref, vis] = useReveal();
            const [hov, setHov] = React.useState(false);
            const isLarge = i === 0;
            return (
              <div key={i} ref={ref}

                  background: tweaks.bgTone === 'dark' ? '#252525' : '#fff',

                  opacity: vis ? 1 : 0, transform: vis ? 'translateY(0)' : 'translateY(30px)',
                  transition: 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
                  transitionDelay: `${i * 80}ms`

                {/* Hex corner accent */}
                <div style={{
                  position: 'absolute', top: -30, right: -30, zIndex: 0,
                  transition: 'transform 0.5s'
                }}>
                  <HexSVG size={100} fill={`${tweaks.accentColor}10`} stroke={tweaks.accentColor} strokeWidth={1} opacity={hov ? 0.5 : 0.15} />
                </div>

                <div style={{
                  height: isLarge ? '100%' : 180,
                  minHeight: isLarge ? 300 : 180,
                  background: `linear-gradient(135deg, ${COLORS.cardboard}22, ${COLORS.cardboard}08)`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) window.scrollTo({ top: el.offsetTop - 70, behavior: 'smooth' });
  };

  return (
    <>
      <Nav tweaks={tweaks} scrollTo={scrollTo} />
      <Hero tweaks={tweaks} scrollTo={scrollTo} />
      <MarqueeBand tweaks={tweaks} />
      <Products tweaks={tweaks} />
      <About tweaks={tweaks} />
      <Sustainability tweaks={tweaks} />
      <Testimonials tweaks={tweaks} />
      <Blog tweaks={tweaks} />
      <Contact tweaks={tweaks} />
      <Footer tweaks={tweaks} />

      <TweaksPanel>
        <TweakSection title="Colores">
          <TweakColor label="Color acento" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
          <TweakRadio label="Tono fondo" options={['cream', 'white', 'dark']} value={tweaks.bgTone} onChange={v => setTweak('bgTone', v)} />
        </TweakSection>
        <TweakSection title="Layout">
          <TweakRadio label="Hero" options={['split', 'centered']} value={tweaks.heroLayout} onChange={v => setTweak('heroLayout', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
